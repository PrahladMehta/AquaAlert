<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AquaAlert · Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="options-shell">
      <header class="options-header">
        <p class="eyebrow">AquaAlert</p>
        <h1>Settings</h1>
        <p class="subtext">Tune your hydration goals, reminder pace, and avatar.</p>
      </header>

      <form id="settings-form" class="settings-card">
        <fieldset>
          <legend>Daily goal</legend>
          <label>
            <span>Daily goal (ml)</span>
            <input type="number" id="dailyGoalMl" min="500" max="6000" step="50" />
          </label>
          <label>
            <span>Drink amount per glass (ml)</span>
            <input type="number" id="drinkAmountMl" min="50" max="1000" step="10" />
          </label>
        </fieldset>

        <fieldset>
          <legend>Reminders</legend>
          <label>
            <span>Reminder interval (minutes)</span>
            <input type="number" id="reminderMinutes" min="1" max="600" step="1" />
            <small>Real mode interval. 120 = every 2 hours.</small>
          </label>
          <label class="toggle">
            <input type="checkbox" id="testingMode" />
            <span>Testing mode (use short interval)</span>
          </label>
          <label>
            <span>Testing interval (minutes)</span>
            <input type="number" id="testingIntervalMinutes" min="1" max="60" step="1" />
          </label>
        </fieldset>

        <fieldset>
          <legend>Avatar</legend>
          <label>
            <span>Avatar name</span>
            <input type="text" id="avatarName" maxlength="20" />
          </label>
        </fieldset>

        <div class="actions">
          <button type="submit" class="primary-btn">Save settings</button>
          <button type="button" id="reset-btn" class="ghost-btn">Reset to defaults</button>
        </div>
        <p id="save-status" class="save-status" aria-live="polite"></p>
      </form>
    </main>

    <script type="module" src="options.js"></script>
  </body>
</html>
